name: Benchmark

on:
  workflow_dispatch:
    inputs:
      scale:
        description: 'Benchmark scale (1 = 20M rows, 0.1 = 2M rows, 0.01 = 200K rows)'
        required: false
        default: '1'
  pull_request:
    paths:
      - 'benchmark/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Run Benchmark
        env:
          BENCHMARK_SCALE: ${{ github.event.inputs.scale || '1' }}
        run: |
          cd benchmark
          chmod +x run.sh
          ./run.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/benchmark-results.md
          if-no-files-found: ignore

      - name: Post Results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'benchmark/benchmark-results.md';
            if (fs.existsSync(resultsPath)) {
              const body = fs.readFileSync(resultsPath, 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
