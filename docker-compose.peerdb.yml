services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: duckling-peerdb-clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./logs/clickhouse:/var/log/clickhouse-server
    restart: unless-stopped
    networks:
      - peerdb-network

  rustfs:
    image: rustfs/rustfs:latest
    container_name: duckling-rustfs
    ports:
      - "19002:9000"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-peerdb}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-peerdbsecret}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
    volumes:
      - rustfs-data:/data
    restart: unless-stopped
    networks:
      - peerdb-network

  catalog:
    image: postgres:18-alpine
    container_name: duckling-peerdb-catalog
    environment:
      - PGUSER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_INITDB_ARGS=--locale=C.UTF-8
    volumes:
      - ./data/peerdb/catalog:/var/lib/postgresql
    restart: unless-stopped
    ports:
      - "19901:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "postgres", "-U", "postgres"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - peerdb-network

  temporal:
    image: temporalio/auto-setup:1.25.1
    container_name: duckling-temporal
    depends_on:
      catalog:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=catalog
      - DYNAMIC_CONFIG_FILE_PATH=/tmp/development-sql.yaml
    ports:
      - "17233:7233"
    entrypoint:
      - /bin/sh
      - -lc
      - |
        cat > /tmp/development-sql.yaml <<'EOF'
        limit.maxIDLength:
          - value: 255
            constraints: {}
        system.forceSearchAttributesCacheRefreshOnRead:
          - value: true
            constraints: {}
        frontend.enableUpdateWorkflowExecution:
          - value: true
            constraints: {}
        EOF
        exec /etc/temporal/entrypoint.sh autosetup
    restart: unless-stopped
    networks:
      - peerdb-network

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: duckling-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "18233:8080"
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - peerdb-network

  temporal-admin-tools:
    image: temporalio/admin-tools:1.25.2-tctl-1.18.1-cli-1.1.1
    container_name: duckling-temporal-admin-tools
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - TEMPORAL_CLI_SHOW_STACKS=1
    stdin_open: true
    tty: true
    entrypoint:
      - /bin/sh
      - -lc
      - |
        sleep 5
        if ! temporal operator search-attribute list --namespace default | grep -w MirrorName >/dev/null 2>&1; then
          temporal operator search-attribute create --name MirrorName --type Text --namespace default
        fi
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD", "tctl", "workflow", "list"]
      interval: 2s
      timeout: 5s
      retries: 60
    restart: unless-stopped
    networks:
      - peerdb-network

  flow-api:
    image: ${PEERDB_FLOW_API_IMAGE:-ghcr.io/peerdb-io/flow-api:stable-v0.36.19}
    container_name: duckling-peerdb-flow-api
    depends_on:
      temporal:
        condition: service_started
      catalog:
        condition: service_healthy
    environment:
      - PEERDB_CATALOG_HOST=catalog
      - PEERDB_CATALOG_PORT=5432
      - PEERDB_CATALOG_USER=postgres
      - PEERDB_CATALOG_PASSWORD=postgres
      - PEERDB_CATALOG_DATABASE=postgres
      - TEMPORAL_HOST_PORT=temporal:7233
      - PEERDB_TEMPORAL_NAMESPACE=default
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_REGION=${AWS_REGION:-us-east-1}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME=${PEERDB_S3_BUCKET:-peerdb-stage}
      - PEERDB_ALLOWED_TARGETS=
    ports:
      - "18112:8112"
      - "18113:8113"
    restart: unless-stopped
    networks:
      - peerdb-network

  flow-snapshot-worker:
    image: ${PEERDB_FLOW_SNAPSHOT_WORKER_IMAGE:-ghcr.io/peerdb-io/flow-snapshot-worker:stable-v0.36.19}
    container_name: duckling-peerdb-flow-snapshot-worker
    depends_on:
      temporal:
        condition: service_started
      catalog:
        condition: service_healthy
    environment:
      - PEERDB_CATALOG_HOST=catalog
      - PEERDB_CATALOG_PORT=5432
      - PEERDB_CATALOG_USER=postgres
      - PEERDB_CATALOG_PASSWORD=postgres
      - PEERDB_CATALOG_DATABASE=postgres
      - TEMPORAL_HOST_PORT=temporal:7233
      - PEERDB_TEMPORAL_NAMESPACE=default
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_REGION=${AWS_REGION:-us-east-1}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME=${PEERDB_S3_BUCKET:-peerdb-stage}
    restart: unless-stopped
    networks:
      - peerdb-network

  flow-worker:
    image: ${PEERDB_FLOW_WORKER_IMAGE:-ghcr.io/peerdb-io/flow-worker:stable-v0.36.19}
    container_name: duckling-peerdb-flow-worker
    depends_on:
      temporal:
        condition: service_started
      catalog:
        condition: service_healthy
    environment:
      - PEERDB_CATALOG_HOST=catalog
      - PEERDB_CATALOG_PORT=5432
      - PEERDB_CATALOG_USER=postgres
      - PEERDB_CATALOG_PASSWORD=postgres
      - PEERDB_CATALOG_DATABASE=postgres
      - TEMPORAL_HOST_PORT=temporal:7233
      - PEERDB_TEMPORAL_NAMESPACE=default
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_REGION=${AWS_REGION:-us-east-1}
      - PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME=${PEERDB_S3_BUCKET:-peerdb-stage}
    restart: unless-stopped
    networks:
      - peerdb-network

  peerdb:
    image: ${PEERDB_SERVER_IMAGE:-ghcr.io/peerdb-io/peerdb-server:stable-v0.36.19}
    container_name: duckling-peerdb-server
    depends_on:
      catalog:
        condition: service_healthy
    environment:
      - PEERDB_CATALOG_HOST=catalog
      - PEERDB_CATALOG_PORT=5432
      - PEERDB_CATALOG_USER=postgres
      - PEERDB_CATALOG_PASSWORD=postgres
      - PEERDB_CATALOG_DATABASE=postgres
      - PEERDB_PASSWORD=${PEERDB_SQL_PASSWORD:-peerdb}
      - PEERDB_FLOW_SERVER_ADDRESS=grpc://flow-api:8112
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    ports:
      - "19900:9900"
    restart: unless-stopped
    networks:
      - peerdb-network

  peerdb-ui:
    image: ${PEERDB_UI_IMAGE:-ghcr.io/peerdb-io/peerdb-ui:stable-v0.36.19}
    container_name: duckling-peerdb-ui
    depends_on:
      - flow-api
    environment:
      - PEERDB_CATALOG_HOST=catalog
      - PEERDB_CATALOG_PORT=5432
      - PEERDB_CATALOG_USER=postgres
      - PEERDB_CATALOG_PASSWORD=postgres
      - PEERDB_CATALOG_DATABASE=postgres
      - PEERDB_FLOW_SERVER_HTTP=http://flow-api:8113
      - NEXTAUTH_SECRET=__changeme__
      - NEXTAUTH_URL=http://localhost:13003
      - PEERDB_ALLOWED_TARGETS=
      - PEERDB_CLICKHOUSE_ALLOWED_DOMAINS=
      - PEERDB_EXPERIMENTAL_ENABLE_SCRIPTING=true
    ports:
      - "13003:3000"
    restart: unless-stopped
    networks:
      - peerdb-network

  clickhouse-server:
    container_name: duckling-peerdb-runtime
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "13001:3000"
      - "13307:3307"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - MYSQL_CONNECTION_STRING=${MYSQL_CONNECTION_STRING}
      - MYSQL_MAX_CONNECTIONS=${MYSQL_MAX_CONNECTIONS:-5}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-default}
      - REPLICATION_BACKEND=peerdb
      - PEERDB_ENABLED=true
      - PEERDB_API_URL=${PEERDB_API_URL:-http://flow-api:8112}
      - PEERDB_UI_URL=${PEERDB_UI_URL:-http://localhost:13003}
      - PEERDB_SQL_HOST=${PEERDB_SQL_HOST:-peerdb}
      - PEERDB_SQL_PORT=${PEERDB_SQL_PORT:-9900}
      - PEERDB_SQL_USER=${PEERDB_SQL_USER:-peerdb}
      - PEERDB_SQL_PASSWORD=${PEERDB_SQL_PASSWORD:-peerdb}
      - PEERDB_SQL_DATABASE=${PEERDB_SQL_DATABASE:-peerdb}
      - PEERDB_CLICKHOUSE_HOST=${PEERDB_CLICKHOUSE_HOST:-clickhouse}
      - PEERDB_CLICKHOUSE_PORT=${PEERDB_CLICKHOUSE_PORT:-9000}
      - PEERDB_MYSQL_DISABLE_TLS=${PEERDB_MYSQL_DISABLE_TLS:-true}
      - PEERDB_MYSQL_FLAVOR=${PEERDB_MYSQL_FLAVOR:-mysql}
      - PEERDB_MYSQL_REPLICATION_MECHANISM=${PEERDB_MYSQL_REPLICATION_MECHANISM:-auto}
      - AWS_ENDPOINT_URL_S3=${AWS_ENDPOINT_URL_S3:-http://rustfs:9000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-peerdb}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-peerdbsecret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - PEERDB_S3_BUCKET=${PEERDB_S3_BUCKET:-peerdb-stage}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DUCKLING_API_KEY=${DUCKLING_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./packages/server/src:/app/packages/server/src
      - ./packages/shared/src:/app/packages/shared/src
    restart: unless-stopped
    depends_on:
      - clickhouse
      - flow-api
    networks:
      - peerdb-network

  clickhouse-frontend:
    container_name: duckling-peerdb-frontend
    profiles:
      - ui
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "13000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NUXT_PUBLIC_API_BASE=http://localhost:13001
    volumes:
      - ./packages/frontend/app:/app/packages/frontend/app
      - ./packages/frontend/nuxt.config.ts:/app/packages/frontend/nuxt.config.ts
      - ./packages/frontend/tailwind.config.ts:/app/packages/frontend/tailwind.config.ts
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/sdk/src:/app/packages/sdk/src
    restart: unless-stopped
    depends_on:
      - clickhouse-server
    networks:
      - peerdb-network

networks:
  peerdb-network:
    name: duckling-peerdb-network
    driver: bridge

volumes:
  rustfs-data:
