services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: integration-clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8124:8123"
      - "9001:9000"
    networks:
      - integration-net

  mysql:
    image: mysql:8.0
    container_name: integration-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: integration_db
      MYSQL_USER: integration
      MYSQL_PASSWORD: integrationpass
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --max-connections=50
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --server-id=1
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - integration-net

  duckling:
    container_name: integration-duckling
    build:
      context: ../..
      dockerfile: docker/server.Dockerfile
    ports:
      - "3002:3000"
      - "3309:3307"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MYSQL_CONNECTION_STRING=${DUCKLING_TEST_MYSQL_CONNECTION_STRING:-mysql://integration:integrationpass@mysql:3306/integration_db?charset=utf8mb4}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DATABASE=default
      - DUCKLING_API_KEY=integration-test-key
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=integrationadmin
      - SESSION_SECRET=integration-session-secret
      - LOG_LEVEL=${DUCKLING_TEST_LOG_LEVEL:-info}
      - SYNC_INTERVAL_MINUTES=0
      - AUTO_START_SYNC=false
      - BATCH_SIZE=${DUCKLING_TEST_BATCH_SIZE:-1000}
      - INSERT_BATCH_SIZE=${DUCKLING_TEST_INSERT_BATCH_SIZE:-500}
      - MAX_CONCURRENT_QUERIES=${DUCKLING_TEST_MAX_CONCURRENT_QUERIES:-10}
      - ENABLE_INCREMENTAL_SYNC=true
      - ENABLE_HEALTH_CHECKS=false
      - AUTO_CLEANUP=false
      - AUTO_BACKUP=false
      - AUTO_RESTART=false
      - ENABLE_CORS=true
      - RATE_LIMIT_ENABLED=false
    depends_on:
      mysql:
        condition: service_healthy
      clickhouse:
        condition: service_started
    networks:
      - integration-net

networks:
  integration-net:
    driver: bridge

volumes:
  mysql-data:
