<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - DuckDB Server</title>
    <link rel="stylesheet" href="/assets/app.css">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        .logs-layout {
            display: flex;
            flex-direction: column;
            padding: 24px;
            height: calc(100vh - 88px);
            overflow: hidden;
        }

        .logs-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .filters-bar {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .real-time-logs {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 16px;
        }

        .logs-container {
            flex: 1;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            line-height: 1.4;
        }

        .log-entry {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: background-color 0.1s;
        }

        .log-entry:hover {
            background: var(--accent);
        }

        .log-entry.error {
            background: #dc262610;
            border-left: 3px solid #dc2626;
        }

        .log-entry.success {
            background: #22c55e10;
            border-left: 3px solid #22c55e;
        }

        .log-entry.warn {
            background: #ea580c10;
            border-left: 3px solid #ea580c;
        }

        .log-entry.info {
            background: #0ea5e910;
            border-left: 3px solid #0ea5e9;
        }

        .log-entry.debug {
            background: #6b728010;
            border-left: 3px solid #6b7280;
        }

        .log-timestamp {
            color: var(--muted-foreground);
            font-size: 11px;
            min-width: 80px;
            flex-shrink: 0;
        }

        .log-level {
            font-weight: 600;
            min-width: 50px;
            flex-shrink: 0;
            text-transform: uppercase;
            font-size: 11px;
        }

        .log-level.error { color: #dc2626; }
        .log-level.success { color: #22c55e; }
        .log-level.warn { color: #ea580c; }
        .log-level.info { color: #0ea5e9; }
        .log-level.debug { color: #6b7280; }

        .log-message {
            flex: 1;
            word-break: break-word;
        }

        .log-context {
            color: var(--muted-foreground);
            font-size: 11px;
            opacity: 0.7;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--accent);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.connected {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: #dc2626;
        }

        .status-indicator.connecting {
            background: #ea580c;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .level-filter {
            display: flex;
            gap: 4px;
            background: var(--background);
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .level-btn {
            padding: 4px 8px;
            border: none;
            background: transparent;
            color: var(--muted-foreground);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .level-btn.active {
            background: var(--foreground);
            color: var(--background);
        }

        .level-btn:hover:not(.active) {
            background: var(--accent);
        }

        .sync-meta {
            display: flex;
            gap: 16px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted-foreground);
        }

        .sync-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .table-name-badge {
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="app-container" x-data="logs()" x-init="init()">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="/dashboard.html" class="sidebar-logo" title="DuckDB Server">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="7.5 4.21 12 6.81 16.5 4.21"/>
                    <polyline points="7.5 19.79 7.5 14.6 3 12"/>
                    <polyline points="21 12 16.5 14.6 16.5 19.79"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            </a>

            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-item" data-tooltip="Dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </a>
                <a href="/tables.html" class="sidebar-item" data-tooltip="Tables">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3h18v18H3V3z"/>
                        <path d="M3 9h18M3 15h18M9 3v18"/>
                    </svg>
                </a>
                <a href="/logs.html" class="sidebar-item active" data-tooltip="Logs">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                </a>
                <a href="/validate.html" class="sidebar-item" data-tooltip="Validate">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user" x-text="userInitials" @click="logout()" data-tooltip="Logout"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="page-header">
                <div>
                    <h1 class="page-title">Sync Logs</h1>
                    <p class="page-subtitle">Real-time table synchronization activity</p>
                </div>
                <div class="log-controls">
                    <div class="level-filter">
                        <button @click="toggleStatus('success')"
                                :class="{'active': filters.status.includes('success')}"
                                class="level-btn">Success</button>
                        <button @click="toggleStatus('error')"
                                :class="{'active': filters.status.includes('error')}"
                                class="level-btn">Error</button>
                    </div>
                    <button @click="togglePause()"
                            :disabled="!isConnected"
                            class="btn btn-outline">
                        <span x-text="isPaused ? 'Resume' : 'Pause'"></span>
                    </button>
                    <button @click="clearLogs()" class="btn btn-outline">Clear</button>
                    <button @click="scrollToBottom()" class="btn btn-outline">Scroll Down</button>
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 14px;">
                        <input type="checkbox" x-model="autoScroll" style="margin: 0;">
                        Auto-scroll
                    </label>
                </div>
            </header>

            <!-- Real-time Logs Content -->
            <div class="logs-layout">
                <div class="real-time-logs">
                    <!-- Status Bar -->
                    <div class="connection-status">
                        <div class="status-indicator"
                             :class="{
                                 'connected': isPolling,
                                 'disconnected': !isPolling
                             }"></div>
                        <span x-text="isPolling ? 'Auto-refresh enabled' : 'Auto-refresh disabled'"></span>
                        <span style="margin-left: auto; color: var(--muted-foreground);">
                            <span x-text="logs.length"></span> sync operations
                            <span x-show="filters.status.length === 0">
                                (all)
                            </span>
                            <span x-show="filters.status.length > 0">
                                (showing: <span x-text="filters.status.join(', ')"></span>)
                            </span>
                            <span x-show="lastUpdate" style="margin-left: 8px;">
                                Last update: <span x-text="formatTime(lastUpdate)"></span>
                            </span>
                        </span>
                    </div>

                    <!-- Logs Container -->
                    <div class="logs-container" x-ref="logsContainer" @scroll="handleScroll()">
                        <template x-for="log in filteredLogs" :key="log.id">
                            <div class="log-entry" :class="log.status">
                                <div class="log-timestamp" x-text="formatLogTime(log.created_at)"></div>
                                <div class="log-level" :class="log.status" x-text="log.status"></div>
                                <div class="log-message">
                                    <div>
                                        <span class="table-name-badge" x-text="log.table_name"></span>
                                        <span x-show="log.error_message" style="color: #dc2626; margin-left: 8px;" x-text="log.error_message"></span>
                                    </div>
                                    <div class="sync-meta">
                                        <div class="sync-meta-item">
                                            <span>Type:</span>
                                            <strong x-text="log.sync_type"></strong>
                                        </div>
                                        <div class="sync-meta-item">
                                            <span>Records:</span>
                                            <strong x-text="log.records_processed?.toLocaleString() || '0'"></strong>
                                        </div>
                                        <div class="sync-meta-item">
                                            <span>Duration:</span>
                                            <strong x-text="log.duration_ms + 'ms'"></strong>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- Empty State -->
                        <div x-show="filteredLogs.length === 0 && !loading"
                             style="text-align: center; padding: 60px 20px; color: var(--muted-foreground);">
                            <svg style="margin: 0 auto 16px; opacity: 0.5;" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                            </svg>
                            <h3 style="font-size: 16px; margin-bottom: 8px;">No sync logs to display</h3>
                            <p style="font-size: 14px;">
                                <span x-show="filters.status.length > 0">Try adjusting the status filters</span>
                                <span x-show="filters.status.length === 0">No sync operations recorded yet</span>
                            </p>
                        </div>

                        <!-- Loading State -->
                        <div x-show="loading"
                             style="text-align: center; padding: 60px 20px; color: var(--muted-foreground);">
                            <div style="margin: 0 auto 16px; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--foreground); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                            <h3 style="font-size: 16px; margin-bottom: 8px;">Loading sync logs...</h3>
                        </div>

                        <!-- Error State -->
                        <div x-show="error && !loading"
                             style="text-align: center; padding: 60px 20px; color: var(--muted-foreground);">
                            <svg style="margin: 0 auto 16px; opacity: 0.5;" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <h3 style="font-size: 16px; margin-bottom: 8px;">Failed to load logs</h3>
                            <p style="font-size: 14px; margin-bottom: 16px;" x-text="error"></p>
                            <button @click="fetchLogs()" class="btn btn-primary">
                                Retry
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function logs() {
            return {
                username: '',
                userInitials: '',
                logs: [],
                isPolling: false,
                isPaused: false,
                autoScroll: true,
                pollInterval: null,
                lastUpdate: null,
                loading: false,
                error: null,
                filters: {
                    status: [] // Empty = show all, or ['success'], ['error'], or both
                },

                async init() {
                    // Check authentication
                    try {
                        const authRes = await fetch('/api/check-auth');
                        const authData = await authRes.json();

                        if (!authData.authenticated) {
                            window.location.href = '/login.html';
                            return;
                        }

                        this.username = authData.username;
                        this.userInitials = authData.username ? authData.username.substring(0, 2).toUpperCase() : 'U';
                    } catch (error) {
                        console.error('Authentication check failed:', error);
                        window.location.href = '/login.html';
                        return;
                    }

                    // Start polling for logs
                    this.startPolling();

                    // Cleanup on page unload
                    window.addEventListener('beforeunload', () => {
                        this.stopPolling();
                    });
                },

                startPolling() {
                    this.isPolling = true;
                    this.fetchLogs(); // Initial fetch

                    // Poll every 5 seconds for sync logs
                    this.pollInterval = setInterval(() => {
                        if (!this.isPaused) {
                            this.fetchLogs();
                        }
                    }, 5000);
                },

                stopPolling() {
                    this.isPolling = false;
                    if (this.pollInterval) {
                        clearInterval(this.pollInterval);
                        this.pollInterval = null;
                    }
                },

                async fetchLogs() {
                    if (this.loading) return;

                    this.loading = true;
                    this.error = null;

                    try {
                        const params = new URLSearchParams({
                            limit: '100'
                        });

                        if (this.filters.status.length > 0) {
                            params.append('status', this.filters.status.join(','));
                        }

                        const response = await fetch(`/api/sync-logs?${params}`);

                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        }

                        const data = await response.json();

                        if (data.success && data.logs) {
                            this.logs = data.logs;
                            this.lastUpdate = Date.now();
                        }
                    } catch (error) {
                        console.error('Failed to fetch sync logs:', error);
                        this.error = error instanceof Error ? error.message : 'Unknown error';
                    } finally {
                        this.loading = false;
                    }
                },

                toggleStatus(status) {
                    const index = this.filters.status.indexOf(status);
                    if (index > -1) {
                        this.filters.status.splice(index, 1);
                    } else {
                        this.filters.status.push(status);
                    }

                    // Re-fetch logs with new filters
                    this.fetchLogs();
                },

                togglePause() {
                    this.isPaused = !this.isPaused;
                },

                clearLogs() {
                    this.logs = [];
                },

                scrollToBottom() {
                    const container = this.$refs.logsContainer;
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                },

                handleScroll() {
                    const container = this.$refs.logsContainer;
                    if (container) {
                        const isScrolledToBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
                        this.autoScroll = isScrolledToBottom;
                    }
                },

                formatLogTime(timestamp) {
                    if (!timestamp) return '';
                    const date = new Date(timestamp);
                    return date.toLocaleTimeString('en-US', {
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        fractionalSecondDigits: 3
                    });
                },

                formatTime(timestamp) {
                    if (!timestamp) return '';
                    const date = new Date(timestamp);
                    return date.toLocaleTimeString('en-US', {
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },

                async logout() {
                    this.stopPolling();
                    try {
                        await fetch('/api/logout', { method: 'POST' });
                        window.location.href = '/login.html';
                    } catch (error) {
                        console.error('Logout failed:', error);
                    }
                },

                get filteredLogs() {
                    if (this.filters.status.length === 0) {
                        return this.logs; // Show all if no filters selected
                    }
                    return this.logs.filter(log => this.filters.status.includes(log.status));
                }
            }
        }
    </script>
</body>
</html>
