services:
  clickhouse:
    container_name: duckling-clickhouse
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./logs/clickhouse:/var/log/clickhouse-server
    restart: unless-stopped
    networks:
      - clickhouse-network

  # ClickHouse Server - Backend API with MySQL replication
  clickhouse-server:
    container_name: duckling-server
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "3001:3000"
      - "3307:3307"
    env_file:
      - .env
    environment:
      # Server configuration
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}

      # Database configuration
      - MYSQL_CONNECTION_STRING=${MYSQL_CONNECTION_STRING}
      - MYSQL_MAX_CONNECTIONS=${MYSQL_MAX_CONNECTIONS:-5}
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-default}

      # Sync configuration
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15}
      - BATCH_SIZE=${BATCH_SIZE:-5000}
      - INSERT_BATCH_SIZE=${INSERT_BATCH_SIZE:-2000}
      - FULL_SYNC_BATCH_SIZE=${FULL_SYNC_BATCH_SIZE:-1000}
      - FULL_SYNC_APPENDER_FLUSH_INTERVAL=${FULL_SYNC_APPENDER_FLUSH_INTERVAL:-1000}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - ENABLE_INCREMENTAL_SYNC=${ENABLE_INCREMENTAL_SYNC:-true}

      # Health checks
      - ENABLE_HEALTH_CHECKS=${ENABLE_HEALTH_CHECKS:-true}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-60000}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-debug}

      # Security & Authentication
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DUCKLING_API_KEY=${DUCKLING_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}

      # CORS
      - ENABLE_CORS=${ENABLE_CORS:-true}
    volumes:
      # Data persistence
      - ./data:/app/data
      - ./logs:/app/logs
      # Hot reload - mount source code
      - ./packages/server/src:/app/packages/server/src
      - ./packages/shared/src:/app/packages/shared/src
    restart: unless-stopped
    depends_on:
      - clickhouse
    networks:
      - clickhouse-network

  # ClickHouse Frontend - Nuxt 4 Dashboard
  clickhouse-frontend:
    container_name: duckling-frontend
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NUXT_PUBLIC_API_BASE=http://localhost:3001
    volumes:
      # Hot reload - mount source code
      - ./packages/frontend/app:/app/packages/frontend/app
      - ./packages/frontend/nuxt.config.ts:/app/packages/frontend/nuxt.config.ts
      - ./packages/frontend/tailwind.config.ts:/app/packages/frontend/tailwind.config.ts
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/sdk/src:/app/packages/sdk/src
    restart: unless-stopped
    depends_on:
      - clickhouse-server
    networks:
      - clickhouse-network

networks:
  clickhouse-network:
    name: duckling-network
    driver: bridge

# Volumes for data persistence (optional, using bind mounts above)
volumes:
  clickhouse-data:
    name: duckling-data
  clickhouse-logs:
    name: duckling-logs
